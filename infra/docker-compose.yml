# Local development: Cloud Core + MQTT broker (Mosquitto) + Client UI.
# Edge Agent connects from real hardware; for local testing run it separately.
services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  cloud-core:
    build:
      context: ../cloud-core
    depends_on:
      - mqtt
    environment:
      TPT_MQTT_BROKER: "tcp://mqtt:1883"
    ports:
      - "8080:8080"

  client-ui:
    build:
      context: ../client-ui
    environment:
      NEXT_PUBLIC_WS_URL: "ws://localhost:8080/ws"
      NEXT_PUBLIC_NODE_ID: "demo-node"
    ports:
      - "3000:3000"
