name: relay
on:
  push:
    paths:
      - "relay/**"
      - ".github/workflows/relay.yml"
  pull_request:
    paths:
      - "relay/**"
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
