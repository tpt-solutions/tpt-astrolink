name: client-ui
on:
  push:
    paths:
      - "client-ui/**"
      - ".github/workflows/client-ui.yml"
  pull_request:
    paths:
      - "client-ui/**"
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
