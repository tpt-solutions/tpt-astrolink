name: cloud-core
on:
  push:
    paths:
      - "cloud-core/**"
      - ".github/workflows/cloud-core.yml"
  pull_request:
    paths:
      - "cloud-core/**"
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
